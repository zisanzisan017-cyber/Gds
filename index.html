<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDS Training Simulator - Amadeus Style</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="header-left">
                <span class="title">AMADEUS GDS TRAINING SIMULATOR</span>
                <span class="version">v1.0 • CLIENT-SIDE</span>
            </div>
            <div class="header-right">
                <span id="current-time"></span>
                <button onclick="printTicketPDF()" class="pdf-btn">📄 PRINT TICKET</button>
            </div>
        </div>
        
        <div id="output" class="terminal-output"></div>
        
        <div class="terminal-input">
            <span class="prompt">&gt;</span>
            <input type="text" id="command-input" autocomplete="off" spellcheck="false">
            <span class="cursor">█</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
