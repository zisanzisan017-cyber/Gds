<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amadeus GDS Simulator</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #terminal-screen {
            display: none;
            flex-direction: column;
            height: calc(100vh - 40px);
        }
        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
            padding-right: 10px;
        }
        #input-line {
            display: flex;
            align-items: center;
        }
        #prompt {
            margin-right: 10px;
        }
        #command-input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: inherit;
            font-size: 16px;
            flex-grow: 1;
            outline: none;
            text-transform: uppercase;
        }
        .error { color: #ff0000; }
        .system { color: #00ffff; }
        .ticket { color: #ffffff; background: #333; padding: 10px; border: 1px dashed #fff; margin: 10px 0; }
        input[type="password"], input[type="text"] {
            background: #222;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px;
            margin: 10px;
            width: 250px;
            text-align: center;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #00cc00;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #00ffff;">AMADEUS GDS SIMULATOR</h1>
        <p>PLEASE SIGN IN</p>
        <input type="text" id="username" placeholder="OFFICE ID / USERNAME" autocomplete="off">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="login()">SIGN IN (JI)</button>
        <p style="font-size: 12px; margin-top: 20px;">COMMAND: JI 1234AB/AS</p>
    </div>

    <div id="terminal-screen">
        <div id="output">AMADEUS GDS - READY FOR COMMANDS
--------------------------------------------------</div>
        <div id="input-line">
            <span id="prompt">></span>
            <input type="text" id="command-input" autofocus spellcheck="false">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
