<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabre Terminal Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SABRE CRS SIMULATOR</h1>
            <div class="status">
                <span>AGENT: ZISAN</span>
                <span>DATE: <span id="current-date"></span></span>
                <span>SESSION: <span id="session-id">ACTIVE</span></span>
            </div>
        </div>
        
        <div class="terminal">
            <div id="output" class="output"></div>
            <div class="input-line">
                <span class="prompt">&gt;</span>
                <input type="text" id="command-input" autofocus autocomplete="off">
            </div>
        </div>
        
        <div class="controls">
            <button onclick="clearScreen()">CLEAR</button>
            <button onclick="saveSession()">SAVE SESSION</button>
            <button onclick="loadSession()">LOAD SESSION</button>
            <button onclick="printTicket()">PRINT TICKET PDF</button>
            <button onclick="endSession()">END SESSION</button>
        </div>
        
        <div class="info-panel">
            <h3>Supported Commands</h3>
            <div class="commands-grid">
                <div>AN - Availability</div>
                <div>SS - Sell Segment</div>
                <div>NM - Name</div>
                <div>AP - Phone</div>
                <div>RF - Received From</div>
                <div>RT - Retrieve PNR</div>
                <div>XE - Cancel Segment</div>
                <div>FQ/FXB - Fare</div>
                <div>TTP - Ticket</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
